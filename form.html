    <h1>The Housemaid (2025) - Movie Form</h1>

    <hr>
   
    <h2>My Opinion</h2>
    
    <form>
        <label for="name">Name</label><br>
        <input type="text" id="name" name="name"><br><br>
        
        <label for="email">Email</label><br>
        <input type="email" id="email" name="email"><br><br>
        <label for="favorite">Favorite Part</label><br>
        <input type="text" id="favorite" name="favorite"><br><br>
           <option>Beginning</option>
           <option>Middle</option>
           <option>End</option>
           <option>Plot Twist</option>
           </select><br><br>


        <label for="5/5 Stars">Rating (1-5)</label><br>
        <input type="number" id="rating" name="rating" min="1" max="5"><br><br>
    <fieldset>
        <legend>Did I like the movie?</legend>
    </fieldset>
        <input type="radio" id="yes" name="liked" value="Yes">
        <label for="yes">Yes</label><br>

        <input type="radio" id="no" name="liked" value="No">
        <label for="no">No</label><br>
        
        <label for="review">Review</label><br>
        <textarea id="review" name="review" rows="5" cols="30"></textarea><br><br>
    <input type="submit" value="Submit">
    <input type="reset" value="Reset">
    </form>


</body>    
</html>
